name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh shellcheck

      - name: Check Zsh syntax
        run: zsh -n zsh-python-m-completion.plugin.zsh

      - name: Run ShellCheck
        run: shellcheck zsh-python-m-completion.plugin.zsh
